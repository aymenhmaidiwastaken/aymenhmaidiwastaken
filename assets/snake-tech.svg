<svg viewBox="0 0 800 290" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.7" fill="#161b22"/>
    </pattern>
  </defs>

  <style>
    @keyframes travel {
      from { stroke-dashoffset: 1700; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes foodPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes headBob {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(4px); }
    }
    .light {
      stroke-dasharray: 120 1580;
      animation: travel 5s linear infinite;
    }
    .food { animation: foodPulse 1.5s ease infinite; }
    .head { animation: headBob 1.8s ease infinite; }
    .label { font-family: 'SF Mono','Fira Code','Courier New',monospace; font-size: 9px; fill: #6e7681; }
  </style>

  <!-- Background -->
  <rect width="800" height="290" rx="10" fill="#0d1117"/>
  <rect width="800" height="290" rx="10" fill="url(#grid)"/>

  <!-- Score HUD -->
  <text x="20" y="18" fill="#00ff41" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="10" opacity="0.5">SCORE: 19</text>
  <text x="780" y="18" text-anchor="end" fill="#00ff41" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="10" opacity="0.5">LEVEL: FULL-STACK</text>

  <!-- ═══ SNAKE BODY PATH ═══ -->
  <!-- Base (dim) -->
  <path d="M 65,60 L 635,60 L 635,145 L 65,145 L 65,230 L 530,230"
        stroke="#003d00" stroke-width="10" fill="none"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Traveling light -->
  <path d="M 65,60 L 635,60 L 635,145 L 65,145 L 65,230 L 530,230"
        stroke="#00ff41" stroke-width="5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        class="light" opacity="0.6"/>

  <!-- ═══ ROW 1 → Python, JavaScript, TypeScript, PHP, C, Node.js, Next.js ═══ -->

  <circle cx="65" cy="60" r="18" fill="#3776AB" stroke="#4a8abf" stroke-width="1.5"/>
  <text x="65" y="64" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10" font-weight="bold">Py</text>
  <text x="65" y="92" text-anchor="middle" class="label">Python</text>

  <circle cx="160" cy="60" r="18" fill="#F7DF1E" stroke="#f9e84e" stroke-width="1.5"/>
  <text x="160" y="64" text-anchor="middle" fill="#000" font-family="monospace" font-size="10" font-weight="bold">JS</text>
  <text x="160" y="92" text-anchor="middle" class="label">JavaScript</text>

  <circle cx="255" cy="60" r="18" fill="#3178C6" stroke="#4a8ed4" stroke-width="1.5"/>
  <text x="255" y="64" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10" font-weight="bold">TS</text>
  <text x="255" y="92" text-anchor="middle" class="label">TypeScript</text>

  <circle cx="350" cy="60" r="18" fill="#777BB4" stroke="#8a8ec2" stroke-width="1.5"/>
  <text x="350" y="64" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10" font-weight="bold">PHP</text>
  <text x="350" y="92" text-anchor="middle" class="label">PHP</text>

  <circle cx="445" cy="60" r="18" fill="#555555" stroke="#777" stroke-width="1.5"/>
  <text x="445" y="64" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12" font-weight="bold">C</text>
  <text x="445" y="92" text-anchor="middle" class="label">C</text>

  <circle cx="540" cy="60" r="18" fill="#339933" stroke="#4db84d" stroke-width="1.5"/>
  <text x="540" y="64" text-anchor="middle" fill="#fff" font-family="monospace" font-size="9" font-weight="bold">Node</text>
  <text x="540" y="92" text-anchor="middle" class="label">Node.js</text>

  <circle cx="635" cy="60" r="18" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="635" y="64" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10" font-weight="bold">N</text>
  <text x="635" y="92" text-anchor="middle" class="label">Next.js</text>

  <!-- ═══ ROW 2 ← Laravel, Vue.js, React, Tailwind, SCSS, MongoDB, MySQL ═══ -->

  <circle cx="635" cy="145" r="18" fill="#FF2D20" stroke="#ff5a50" stroke-width="1.5"/>
  <text x="635" y="149" text-anchor="middle" fill="#fff" font-family="monospace" font-size="9" font-weight="bold">Lv</text>
  <text x="635" y="177" text-anchor="middle" class="label">Laravel</text>

  <circle cx="540" cy="145" r="18" fill="#4FC08D" stroke="#6fd4a5" stroke-width="1.5"/>
  <text x="540" y="149" text-anchor="middle" fill="#fff" font-family="monospace" font-size="9" font-weight="bold">Vue</text>
  <text x="540" y="177" text-anchor="middle" class="label">Vue.js</text>

  <circle cx="445" cy="145" r="18" fill="#61DAFB" stroke="#85e3fc" stroke-width="1.5"/>
  <text x="445" y="149" text-anchor="middle" fill="#000" font-family="monospace" font-size="9" font-weight="bold">Re</text>
  <text x="445" y="177" text-anchor="middle" class="label">React</text>

  <circle cx="350" cy="145" r="18" fill="#06B6D4" stroke="#2cc8e3" stroke-width="1.5"/>
  <text x="350" y="149" text-anchor="middle" fill="#fff" font-family="monospace" font-size="8" font-weight="bold">TW</text>
  <text x="350" y="177" text-anchor="middle" class="label">Tailwind</text>

  <circle cx="255" cy="145" r="18" fill="#CC6699" stroke="#d986b0" stroke-width="1.5"/>
  <text x="255" y="149" text-anchor="middle" fill="#fff" font-family="monospace" font-size="9" font-weight="bold">Sass</text>
  <text x="255" y="177" text-anchor="middle" class="label">SCSS</text>

  <circle cx="160" cy="145" r="18" fill="#47A248" stroke="#63b864" stroke-width="1.5"/>
  <text x="160" y="149" text-anchor="middle" fill="#fff" font-family="monospace" font-size="8" font-weight="bold">Mgo</text>
  <text x="160" y="177" text-anchor="middle" class="label">MongoDB</text>

  <circle cx="65" cy="145" r="18" fill="#4479A1" stroke="#5c90b5" stroke-width="1.5"/>
  <text x="65" y="149" text-anchor="middle" fill="#fff" font-family="monospace" font-size="8" font-weight="bold">SQL</text>
  <text x="65" y="177" text-anchor="middle" class="label">MySQL</text>

  <!-- ═══ ROW 3 → Docker, Git, Linux, GitHub, VS Code ═══ -->

  <circle cx="65" cy="230" r="18" fill="#2496ED" stroke="#4aabf2" stroke-width="1.5"/>
  <text x="65" y="234" text-anchor="middle" fill="#fff" font-family="monospace" font-size="8" font-weight="bold">Dkr</text>
  <text x="65" y="262" text-anchor="middle" class="label">Docker</text>

  <circle cx="160" cy="230" r="18" fill="#F05032" stroke="#f3735a" stroke-width="1.5"/>
  <text x="160" y="234" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10" font-weight="bold">Git</text>
  <text x="160" y="262" text-anchor="middle" class="label">Git</text>

  <circle cx="255" cy="230" r="18" fill="#FCC624" stroke="#fdcf4a" stroke-width="1.5"/>
  <text x="255" y="234" text-anchor="middle" fill="#000" font-family="monospace" font-size="8" font-weight="bold">Tux</text>
  <text x="255" y="262" text-anchor="middle" class="label">Linux</text>

  <circle cx="350" cy="230" r="18" fill="#333" stroke="#6e7681" stroke-width="1.5"/>
  <text x="350" y="234" text-anchor="middle" fill="#fff" font-family="monospace" font-size="8" font-weight="bold">GH</text>
  <text x="350" y="262" text-anchor="middle" class="label">GitHub</text>

  <circle cx="445" cy="230" r="18" fill="#007ACC" stroke="#2a94d9" stroke-width="1.5"/>
  <text x="445" y="234" text-anchor="middle" fill="#fff" font-family="monospace" font-size="8" font-weight="bold">VS</text>
  <text x="445" y="262" text-anchor="middle" class="label">VS Code</text>

  <!-- ═══ SNAKE HEAD ═══ -->
  <g class="head">
    <polygon points="545,215 578,230 545,245" fill="#00ff41"/>
    <circle cx="558" cy="223" r="2.5" fill="#0d1117"/>
    <circle cx="558" cy="237" r="2.5" fill="#0d1117"/>
  </g>

  <!-- ═══ FOOD PELLET ═══ -->
  <g class="food">
    <circle cx="635" cy="230" r="18" fill="#ff5f56" stroke="#ff8078" stroke-width="1.5"/>
    <text x="635" y="235" text-anchor="middle" fill="#0d1117" font-family="monospace" font-size="16" font-weight="bold">?</text>
  </g>
  <text x="635" y="262" text-anchor="middle" class="label">next?</text>

</svg>