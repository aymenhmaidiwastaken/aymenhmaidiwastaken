<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <style>
    @keyframes trace {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -1016; }
    }
    .tracer {
      animation: trace 6s linear infinite;
    }
  </style>

  <!-- Dark background -->
  <rect x="4" y="4" width="252" height="252" rx="4" fill="#0d1117"/>

  <!-- Profile photo -->
  <image href="data:image/jpeg;base64," x="5" y="5" width="250" height="250" preserveAspectRatio="xMidYMid slice"/>

  <!-- Tracing line that snakes around the border -->
  <rect x="4" y="4" width="252" height="252" rx="4" fill="none"
        stroke="#00ff41" stroke-width="2"
        stroke-dasharray="150 866"
        stroke-linecap="round"
        class="tracer" opacity="0.9"/>
</svg>